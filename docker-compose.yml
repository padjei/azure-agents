services:
  agent:
    build: .
    image: azure-agents:latest
    container_name: azure_security_ai_agent
    # Allows the interactive terminal loop to remain open for chatting with Claude
    stdin_open: true
    tty: true
    environment:
      # Passes host Claude credentials into the container. Prefer subscription
      # OAuth: on the host run `eval "$(ant auth print-credentials --env)"` first
      # (sets ANTHROPIC_AUTH_TOKEN). ANTHROPIC_API_KEY is the API-key alternative.
      # The container has no `ant` CLI, so one of these must be set on the host.
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
    volumes:
      # Mounts your local Azure CLI token cache directly into the container's root profile
      - ~/.azure:/root/.azure

  # Data Architect agent — reuses the same image, different entrypoint.
  # Launch with: docker compose run --rm data-architect
  data-architect:
    build: .
    image: azure-agents:latest
    container_name: azure_data_architect_agent
    command: python data_architect_agent.py
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
    volumes:
      - ~/.azure:/root/.azure
